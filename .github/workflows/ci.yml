name: Validate Flows

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          echo "Validating Maestro flow files..."
          find flows -name "*.yaml" -exec sh -c '
            python3 -c "import yaml; yaml.safe_load(open(\"$1\"))" 2>&1 && echo "OK: $1" || (echo "INVALID: $1" && exit 1)
          ' _ {} \;
          echo "All flows valid."

      - name: Count flows
        run: echo "Total flows: $(find flows -name '*.yaml' | wc -l | tr -d ' ')"
