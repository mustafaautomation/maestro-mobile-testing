appId: com.saucelabs.mydemoapp
tags:
  - regression
  - auth
---
# Logout Flow — Verify user can log out

- launchApp
- tapOn: "Menu"
- tapOn: "Log In"
- tapOn:
    id: "nameET"
- inputText: "bod@example.com"
- tapOn:
    id: "passwordET"
- inputText: "10203040"
- tapOn: "LOGIN"
- assertVisible: "PRODUCTS"

# Now logout
- tapOn: "Menu"
- tapOn: "Log Out"
- tapOn: "LOG OUT"
- assertVisible: "Log In"
